name: crackvision
description: Ứng dụng phát hiện vết nứt bề mặt bằng AI
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.1.4

  # HTTP client
  dio: ^5.4.3+1

  # Local storage
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2

  # Image
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1
  image: ^4.1.7

  # AI on-device (offline)
  tflite_flutter: ^0.12.1

  # Connectivity
  connectivity_plus: ^6.0.3

  # UI
  shimmer: ^3.0.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1
  json_serializable: ^6.8.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/models/
    - assets/i18n/
